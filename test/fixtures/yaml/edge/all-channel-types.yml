alertChannels:
  - name: slack-chan
    config:
      channelType: slack
      webhookUrl: https://hooks.slack.com/services/T/B/x
      mentionText: "@channel"

  - name: discord-chan
    config:
      channelType: discord
      webhookUrl: https://discord.com/api/webhooks/123/abc
      mentionRoleId: "12345"

  - name: email-chan
    config:
      channelType: email
      recipients: [a@test.com, b@test.com]

  - name: pagerduty-chan
    config:
      channelType: pagerduty
      routingKey: routing-key-123
      severityOverride: critical

  - name: opsgenie-chan
    config:
      channelType: opsgenie
      apiKey: og-api-key-456
      region: us

  - name: teams-chan
    config:
      channelType: teams
      webhookUrl: https://outlook.office.com/webhook/xxx

  - name: webhook-chan
    config:
      channelType: webhook
      url: https://webhooks.example.com/alerts
      signingSecret: secret-123
      customHeaders:
        Authorization: Bearer token
