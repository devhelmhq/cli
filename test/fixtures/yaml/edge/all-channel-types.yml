alertChannels:
  - name: slack-chan
    type: slack
    config:
      webhookUrl: https://hooks.slack.com/services/T/B/x
      mentionText: "@channel"

  - name: discord-chan
    type: discord
    config:
      webhookUrl: https://discord.com/api/webhooks/123/abc
      mentionRoleId: "12345"

  - name: email-chan
    type: email
    config:
      recipients: [a@test.com, b@test.com]

  - name: pagerduty-chan
    type: pagerduty
    config:
      routingKey: routing-key-123
      severityOverride: critical

  - name: opsgenie-chan
    type: opsgenie
    config:
      apiKey: og-api-key-456
      region: us

  - name: teams-chan
    type: teams
    config:
      webhookUrl: https://outlook.office.com/webhook/xxx

  - name: webhook-chan
    type: webhook
    config:
      url: https://webhooks.example.com/alerts
      signingSecret: secret-123
      customHeaders:
        Authorization: Bearer token
